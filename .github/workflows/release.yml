name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to release; its version must match build/config.yml.'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_PLATFORMS: macos-arm64,macos-amd64,windows-amd64
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25.x'
      - name: Require the configured tag
        run: |
          tag="$RELEASE_TAG"
          version="$(go run ./scripts/release version -config build/config.yml)"
          expected="v$version"
          case "$tag" in v*) ;; *) echo "Release must use a v* tag, got $tag." >&2; exit 1;; esac
          test "${{ github.event_name }}" != push || test "${{ github.ref_type }}" = tag
          git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null
          if [ "$tag" != "$expected" ]; then
            echo "Requested tag $tag does not match build/config.yml ($expected)." >&2
            exit 1
          fi

  windows-amd64:
    name: Windows amd64
    needs: validate-tag
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.x'
      - name: Install build tools
        shell: pwsh
        run: |
          npm install --global yarn@1.22.22
          choco install protoc -y --no-progress
          go install github.com/go-task/task/v3/cmd/task@v3.45.4
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          Add-Content $env:GITHUB_PATH "$(go env GOPATH)\bin"
      - name: Generate bindings and build frontend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force frontend/dist | Out-Null
          Set-Content -NoNewline frontend/dist/.wails-placeholder 'placeholder'
          task common:generate:bindings
          yarn --cwd frontend install --frozen-lockfile
          yarn --cwd frontend build
          if (-not (Test-Path frontend/dist)) { throw 'frontend/dist was not created' }
      - name: Build Windows archive
        shell: pwsh
        run: |
          task release:clean
          task release:build:windows:amd64
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: windows-amd64
          path: bin/release/*/cursor-byok-*-windows-amd64.zip
          if-no-files-found: error
          retention-days: 1

  macos-amd64:
    name: macOS amd64
    needs: validate-tag
    runs-on: macos-13
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.x'
      - name: Install build tools
        run: |
          npm install --global yarn@1.22.22
          if ! command -v protoc >/dev/null 2>&1; then
            version=35.1
            arch="$(uname -m)"
            case "$arch" in
              arm64) platform=aarch_64 ;;
              x86_64) platform=x86_64 ;;
              *) echo "Unsupported macOS architecture: $arch" >&2; exit 1 ;;
            esac
            curl --fail --location --retry 3 --output "$RUNNER_TEMP/protoc.zip" "https://github.com/protocolbuffers/protobuf/releases/download/v${version}/protoc-${version}-osx-${platform}.zip"
            unzip -q "$RUNNER_TEMP/protoc.zip" -d "$RUNNER_TEMP/protoc"
            echo "$RUNNER_TEMP/protoc/bin" >> "$GITHUB_PATH"
            export PATH="$RUNNER_TEMP/protoc/bin:$PATH"
          fi
          protoc --version
          go install github.com/go-task/task/v3/cmd/task@v3.45.4
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate bindings and build frontend
        run: |
          mkdir -p frontend/dist
          : > frontend/dist/.wails-placeholder
          task common:generate:bindings
          yarn --cwd frontend install --frozen-lockfile
          yarn --cwd frontend build
          test -d frontend/dist
      - name: Build, verify, and archive
        run: |
          task release:clean
          task release:build:macos:amd64
          archive="bin/release/$(go run ./scripts/release version)/cursor-byok-$(go run ./scripts/release version)-macos-amd64.tar.gz"
          stage="$RUNNER_TEMP/macos-amd64"
          mkdir -p "$stage"
          tar -xzf "$archive" -C "$stage"
          app="$stage/Cursor助手.app"
          executable="$app/Contents/MacOS/Cursor助手"
          test -d "$app/Contents/MacOS"
          test -d "$app/Contents/Resources"
          test -f "$app/Contents/Info.plist"
          test -f "$app/Contents/Resources/icons.icns"
          test -x "$executable"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -F 'Signature=adhoc'
          file "$executable"
          file "$executable" | grep -Eq 'x86_64|amd64'
          lipo -info "$executable"
          test "$(lipo -archs "$executable")" = x86_64
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: macos-amd64
          path: bin/release/*/cursor-byok-*-macos-amd64.tar.gz
          if-no-files-found: error
          retention-days: 1

  macos-arm64:
    name: macOS arm64
    needs: validate-tag
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Require hosted arm64 runner
        run: test "$(uname -m)" = arm64 || { echo 'macos-14 did not provide an arm64 runner; refusing to publish a mislabeled asset.' >&2; exit 1; }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.x'
      - name: Install build tools
        run: |
          npm install --global yarn@1.22.22
          if ! command -v protoc >/dev/null 2>&1; then
            version=35.1
            arch="$(uname -m)"
            case "$arch" in
              arm64) platform=aarch_64 ;;
              x86_64) platform=x86_64 ;;
              *) echo "Unsupported macOS architecture: $arch" >&2; exit 1 ;;
            esac
            curl --fail --location --retry 3 --output "$RUNNER_TEMP/protoc.zip" "https://github.com/protocolbuffers/protobuf/releases/download/v${version}/protoc-${version}-osx-${platform}.zip"
            unzip -q "$RUNNER_TEMP/protoc.zip" -d "$RUNNER_TEMP/protoc"
            echo "$RUNNER_TEMP/protoc/bin" >> "$GITHUB_PATH"
            export PATH="$RUNNER_TEMP/protoc/bin:$PATH"
          fi
          protoc --version
          go install github.com/go-task/task/v3/cmd/task@v3.45.4
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate bindings and build frontend
        run: |
          mkdir -p frontend/dist
          : > frontend/dist/.wails-placeholder
          task common:generate:bindings
          yarn --cwd frontend install --frozen-lockfile
          yarn --cwd frontend build
          test -d frontend/dist
      - name: Build, verify, and archive
        run: |
          task release:clean
          task release:build:macos:arm64
          archive="bin/release/$(go run ./scripts/release version)/cursor-byok-$(go run ./scripts/release version)-macos-arm64.tar.gz"
          stage="$RUNNER_TEMP/macos-arm64"
          mkdir -p "$stage"
          tar -xzf "$archive" -C "$stage"
          app="$stage/Cursor助手.app"
          executable="$app/Contents/MacOS/Cursor助手"
          test -d "$app/Contents/MacOS"
          test -d "$app/Contents/Resources"
          test -f "$app/Contents/Info.plist"
          test -f "$app/Contents/Resources/icons.icns"
          test -x "$executable"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -F 'Signature=adhoc'
          file "$executable"
          file "$executable" | grep -Eq 'arm64|aarch64'
          lipo -info "$executable"
          test "$(lipo -archs "$executable")" = arm64
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: macos-arm64
          path: bin/release/*/cursor-byok-*-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs: [windows-amd64, macos-amd64, macos-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25.x'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: bin/release
          merge-multiple: true
      - name: Verify release assets and generate update manifest
        run: |
          version="$(go run ./scripts/release version -config build/config.yml)"
          tag="v$version"
          if [ "$RELEASE_TAG" != "$tag" ]; then
            echo "Validated release tag $RELEASE_TAG does not match build/config.yml ($tag)." >&2
            exit 1
          fi
          release_dir="bin/release/$version"
          mkdir -p "$release_dir"
          find bin/release -type f -name 'cursor-byok-*' -not -path "$release_dir/*" -exec mv {} "$release_dir" \;
          go run ./scripts/release verify -config build/config.yml -assets-dir "$release_dir" -base-name cursor-byok -platforms "$RELEASE_PLATFORMS"
          go run ./scripts/release manifest -config build/config.yml -assets-dir "$release_dir" -out "$release_dir/update.json" -repo "${{ github.repository }}" -base-name cursor-byok -notes release-notes.md -platforms "$RELEASE_PLATFORMS"
          python3 - "$release_dir" "$version" <<'PY'
          import hashlib, json, pathlib, sys
          directory, version = map(pathlib.Path, sys.argv[1:])
          manifest = json.loads((directory / 'update.json').read_text())
          suffixes = {'macos-arm64': '.tar.gz', 'macos-amd64': '.tar.gz', 'windows-amd64': '.zip'}
          assert set(manifest['platforms']) == set(suffixes), manifest['platforms']
          for platform, suffix in suffixes.items():
              name = f'cursor-byok-{version}-{platform}{suffix}'
              path = directory / name
              assert path.is_file(), name
              checksum = hashlib.sha256(path.read_bytes()).hexdigest()
              assert manifest['platforms'][platform]['checksum'] == f'sha256:{checksum}', name
          PY
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(go run ./scripts/release version -config build/config.yml)"
          tag="v$version"
          release_dir="bin/release/$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" --title "$tag" --notes-file release-notes.md
          fi
          gh release upload "$tag" "$release_dir"/* --clobber